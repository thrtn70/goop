<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none" role="img" aria-label="Goop">
  <defs>
    <!-- Hand-drawn edge wobble: low-frequency turbulence displaces the path
         silhouette so it reads as drawn, not generated. Scale tuned so the
         effect is visible at 22rem and barely perceptible at favicon size. -->
    <filter id="goop-rough" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" seed="7" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.6" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Back + front layers go through the rough filter so their edges share
       the same hand-drawn jitter. Highlight stays smooth (it represents the
       liquid sheen, not the painted shape). -->
  <g filter="url(#goop-rough)">
    <!-- Back layer: subtle accent tint, slight up-left drift, suggests motion behind. -->
    <path
      d="M55.6 10.2c10.6 1.5 19 9.6 22.8 19.6 3.7 9.7 1.6 20.3-3.6 28.8-5 8.2-13.7 14.6-23.6 16.4-10.5 1.9-22.2-1.6-29.5-9.5-7.5-8.1-9.4-20.2-6.4-30.7C18.2 24.2 26.8 16.5 36.5 12.8c6-2.3 12.6-3.5 19.1-2.6Z"
      fill="oklch(20% 0.05 160)"
      transform="translate(-2 -2)"
    />
    <!-- Front layer: the main blob, intentionally asymmetric. -->
    <path
      d="M58.2 14.8c10.4 2 18 10.6 21 20.6 3 10-.5 21-7.2 28.6-6.5 7.4-16.5 11.8-26.4 11-9.7-.7-19.4-6.4-24-14.9-4.7-8.7-3.7-19.9 1.4-28.3C28.4 23.1 37.5 16.4 47.4 14.6c3.6-.7 7.2-.5 10.8.2Z"
      fill="oklch(70% 0.13 160)"
    />
  </g>

  <!-- Highlight: small inner sheen for dimension. -->
  <path
    d="M37 26c4.6-2.4 10.6-3.4 14.5-.2 1.6 1.3 1.4 3.6-.2 4.6-3.7 2.3-8.4 1.7-12.2 4.2-2 1.4-4.4 1.2-5.6-.7-1.4-2.2.7-6.2 3.5-7.9Z"
    fill="oklch(94% 0.005 160 / 0.55)"
  />
</svg>
