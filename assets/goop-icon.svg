<?xml version="1.0" encoding="UTF-8"?>
<!--
  Goop app icon — the same brand mark, centred inside a warm-tinted
  dark squircle backdrop. Used as the source for `npx tauri icon`,
  which rasterises this to every macOS / Windows / store size.
  Hex values mirror the in-app dark-theme tokens:
    squircle:              oklch(0.20 0.008 160) ≈ #1c2622
    back layer (subtle):   oklch(0.24 0.05  160) ≈ #234633
    front layer (accent):  oklch(0.68 0.14  160) ≈ #5cb892
    highlight:             oklch(0.98 0.005 160 / 0.55)
  The blob is scaled 8.53× and translated so the original 96-unit
  artwork fills ~80% of the 1024-unit canvas with even margin
  (matches Apple's HIG ~10%-margin recommendation for iOS / macOS
  app icons). Squircle corner radius is 22.4% of the side length —
  rounded-rect approximation of macOS Big Sur's true squircle is
  visually indistinguishable at icon sizes.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!-- Warm-tinted dark squircle backdrop -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="#1c2622" />

  <!-- Brand mark, scaled and centred. Translate -2,-2 in the original
       viewBox lifted the back layer slightly toward the upper-left;
       that's preserved by applying it inside the scaled group. -->
  <g transform="translate(102 102) scale(8.53)">
    <path
      d="M55.6 10.2c10.6 1.5 19 9.6 22.8 19.6 3.7 9.7 1.6 20.3-3.6 28.8-5 8.2-13.7 14.6-23.6 16.4-10.5 1.9-22.2-1.6-29.5-9.5-7.5-8.1-9.4-20.2-6.4-30.7C18.2 24.2 26.8 16.5 36.5 12.8c6-2.3 12.6-3.5 19.1-2.6Z"
      fill="#234633"
      transform="translate(-2 -2)"
    />
    <path
      d="M58.2 14.8c10.4 2 18 10.6 21 20.6 3 10-.5 21-7.2 28.6-6.5 7.4-16.5 11.8-26.4 11-9.7-.7-19.4-6.4-24-14.9-4.7-8.7-3.7-19.9 1.4-28.3C28.4 23.1 37.5 16.4 47.4 14.6c3.6-.7 7.2-.5 10.8.2Z"
      fill="#5cb892"
    />
    <path
      d="M37 26c4.6-2.4 10.6-3.4 14.5-.2 1.6 1.3 1.4 3.6-.2 4.6-3.7 2.3-8.4 1.7-12.2 4.2-2 1.4-4.4 1.2-5.6-.7-1.4-2.2.7-6.2 3.5-7.9Z"
      fill="rgb(248,250,248)"
      fill-opacity="0.55"
    />
  </g>
</svg>
