name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Create the draft release once, before any matrix builder runs. tauri-action
  # in a matrix has a known race: each runner does "find or create draft" and
  # when several see "no draft yet" they each create one, leaving multiple
  # drafts with the assets split across them. Pre-creating the release here
  # gives every builder a stable releaseId to attach to.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.upsert.outputs.result }}
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        id: upsert
        with:
          result-encoding: string
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            // If we're re-running the workflow for an existing tag, reuse any
            // draft already attached to it instead of creating a duplicate.
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 50,
            });
            const existing = releases.find(r => r.tag_name === tag);
            if (existing) {
              core.info(`Reusing existing release ${existing.id} (${existing.html_url})`);
              return existing.id.toString();
            }
            const { data: created } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Goop ${tag}`,
              draft: true,
              prerelease: false,
            });
            core.info(`Created draft release ${created.id} (${created.html_url})`);
            return created.id.toString();

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,       target: aarch64-apple-darwin,   bundle: "app,dmg" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, bundle: "nsis,msi" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with: { targets: "${{ matrix.target }}" }
      # Restore from existing main-branch caches but don't save new ones.
      # Tag builds happen rarely (a few per quarter) and each adds ~500MB
      # to the 10GB cache quota; over time that fills up and the post-step
      # cache-save fails (e.g. v0.2.1's Windows builder hit the quota at
      # 9.4GB). save-if=false lets us keep the warm-start benefit without
      # accumulating tag-only caches forever.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          save-if: "false"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with: { node-version: "20", cache: "npm" }
      - name: Fetch sidecars
        shell: bash
        run: ./scripts/fetch-sidecars.sh "${{ matrix.target }}"
      - run: npm ci
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}
