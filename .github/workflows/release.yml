name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Create the draft release once, before any matrix builder runs. tauri-action
  # in a matrix has a known race: each runner does "find or create draft" and
  # when several see "no draft yet" they each create one, leaving multiple
  # drafts with the assets split across them. Pre-creating the release here
  # gives every builder a stable releaseId to attach to.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.upsert.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: upsert
        with:
          result-encoding: string
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            // If we're re-running the workflow for an existing tag, reuse any
            // draft already attached to it instead of creating a duplicate.
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 50,
            });
            const existing = releases.find(r => r.tag_name === tag);
            if (existing) {
              core.info(`Reusing existing release ${existing.id} (${existing.html_url})`);
              return existing.id.toString();
            }
            const { data: created } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Goop ${tag}`,
              draft: true,
              prerelease: false,
            });
            core.info(`Created draft release ${created.id} (${created.html_url})`);
            return created.id.toString();

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,       target: aarch64-apple-darwin,   bundle: "app,dmg" }
          - { os: macos-14,       target: x86_64-apple-darwin,    bundle: "app,dmg" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, bundle: "nsis,msi" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - name: Fetch sidecars
        shell: bash
        run: ./scripts/fetch-sidecars.sh "${{ matrix.target }}"
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}
