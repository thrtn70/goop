name: audit
on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with: { components: "rustfmt,clippy" }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          cache-directories: ~/.cargo/bin
      - name: System libs (Tauri 2)
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Resolve target
        shell: bash
        run: echo "TARGET=$(rustc -vV | awk '/host/ {print $2}')" >> "$GITHUB_ENV"
      - name: Fetch sidecars (required for goop-tauri build)
        shell: bash
        run: ./scripts/fetch-sidecars.sh "$TARGET"
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace --all-features
      - name: Security audit
        run: |
          cargo install cargo-audit --locked --quiet
          cargo audit

  web:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test

  sidecar-smoke:
    strategy:
      matrix:
        os: [macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Resolve target
        shell: bash
        run: echo "TARGET=$(rustc -vV | awk '/host/ {print $2}')" >> "$GITHUB_ENV"
      - name: Fetch sidecars
        shell: bash
        run: ./scripts/fetch-sidecars.sh "$TARGET"
      - name: Smoke test
        shell: bash
        run: |
          ls src-tauri/bin/
          # Verify binaries invoke
          "./src-tauri/bin/ffmpeg-$TARGET"${{ matrix.os == 'windows-latest' && '.exe' || '' }} -version
          "./src-tauri/bin/yt-dlp-$TARGET"${{ matrix.os == 'windows-latest' && '.exe' || '' }} --version
          "./src-tauri/bin/gallery-dl-$TARGET"${{ matrix.os == 'windows-latest' && '.exe' || '' }} --version
      # Compile-check the Windows-only Rust paths on a real Windows
      # runner. cfg(windows) code in goop-queue::process_control was
      # not exercised by the Linux audit job, so v0.2.0 hit two
      # tag-time regressions (windows-sys feature mismatch + missing
      # ntdll exports). Cross-compiling on Linux is blocked by C-deps
      # (sqlite3, ring) requiring a Windows toolchain we don't want
      # to install in CI; running natively here is cheaper and 100%
      # faithful to the release builder.
      - name: Cargo check (Windows-only path)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: cargo check -p goop-queue --all-features
