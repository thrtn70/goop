[package]
name = "goop-queue"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
goop-core = { path = "../goop-core" }
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
tokio-util = { workspace = true, features = ["rt"] }
tracing.workspace = true
rusqlite = { version = "0.31", features = ["bundled", "serde_json"] }
parking_lot = "0.12"
dashmap = "6"
uuid = { workspace = true, features = ["v7"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
# Used for OpenProcess + CloseHandle + PROCESS_SUSPEND_RESUME. The
# pause/resume entry points themselves (NtSuspendProcess / NtResumeProcess)
# are NOT in windows-sys at any version — Microsoft's auto-generated
# win32 metadata excludes them. They're declared manually in
# process_control.rs as `extern "system" fn ... -> i32` and linked
# against ntdll.dll.
windows-sys = { version = "0.60", features = [
    "Win32_Foundation",
    "Win32_System_Threading",
] }

[dev-dependencies]
tempfile = "3"
goop-core = { path = "../goop-core", features = ["test-util"] }
